# Optional: Render often requires a credit card for free services.
# Prefer Vercel instead — see DEPLOY.md and vercel.json.
#
# If you already have Render billing enabled, this blueprint still works.
services:
  - type: web
    name: vu-lms-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
